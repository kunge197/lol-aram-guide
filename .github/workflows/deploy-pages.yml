name: 部署到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://kunge197.github.io/lol-aram-guide/
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装依赖
        run: npm ci

      - name: 构建静态站点
        run: npm run build

      - name: 添加 .nojekyll 文件
        run: touch out/.nojekyll

      - name: 安装 gh-pages 扩展
        run: gh extension install github/gh-pages

      - name: 部署到 GitHub Pages
        run: gh pages deploy --dist out
        env:
          GH_TOKEN: ${{ github.token }}
