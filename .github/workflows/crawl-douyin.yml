name: 套路数据爬取

on:
  schedule:
    - cron: "0 2 */3 * *"
  workflow_dispatch:
    inputs:
      urls:
        description: "要处理的视频链接（多个用逗号分隔）"
        required: false
        type: string

env:
  PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装依赖
        run: npm ci

      - name: 安装 ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5

      - name: 安装 Playwright 及浏览器
        run: |
          # 先安装 playwright 到临时环境并下载 chromium
          uv run --with playwright==1.61.0 -- python -m playwright install --with-deps chromium 2>&1

      - name: 运行爬虫
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          if [ -n "${{ inputs.urls }}" ]; then
            echo "${{ inputs.urls }}" | tr ',' '\n' | while read url; do
              url=$(echo "$url" | xargs)
              [ -n "$url" ] && npm run crawl -- --url "$url"
            done
          else
            npm run crawl
          fi

      - name: 检查数据变更
        id: check
        run: |
          if [ -n "$(git status --porcelain 'data/champions.json' 'data/other-builds.json')" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/champions.json data/other-builds.json data/.crawl-state.json
          git commit -m "chore(data): 自动爬取套路数据 $(date +%Y-%m-%d)"
          git push
